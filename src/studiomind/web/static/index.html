<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudioMind</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: #262626;
      --text: #e5e5e5;
      --text-muted: #737373;
      --accent: #8b5cf6;
      --accent-dim: #7c3aed20;
      --tool-bg: #1a1520;
      --tool-border: #2d2438;
      --error: #ef4444;
      --success: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.connected { background: var(--success); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-user {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      margin-left: auto;
      max-width: 600px;
      width: fit-content;
    }

    .msg-assistant {
      line-height: 1.6;
      padding: 4px 0;
    }

    .msg-assistant p { margin-bottom: 8px; }
    .msg-assistant strong { color: #f5f5f5; }
    .msg-assistant ul, .msg-assistant ol { padding-left: 20px; margin-bottom: 8px; }
    .msg-assistant li { margin-bottom: 4px; }

    .msg-system {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      padding: 8px;
    }

    .msg-error {
      background: #1a0a0a;
      border: 1px solid #3d1515;
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--error);
      font-size: 14px;
    }

    /* Tool calls */
    .msg-tool {
      background: var(--tool-bg);
      border: 1px solid var(--tool-border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .tool-icon { font-size: 14px; }

    .tool-detail {
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .tool-result {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--tool-border);
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      max-height: 120px;
      overflow-y: auto;
      word-break: break-all;
    }

    /* Thinking indicator */
    .thinking {
      display: none;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 12px 0;
      color: var(--text-muted);
      font-size: 14px;
      align-items: center;
      gap: 10px;
    }

    .thinking.active { display: flex; }

    .thinking-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot 1.4s infinite;
      margin-right: 3px;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input */
    .input-area {
      padding: 16px 24px 24px;
      background: var(--bg);
    }

    .input-container {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 56px 14px 18px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 52px;
      max-height: 200px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .input-box:focus { border-color: var(--accent); }

    .input-box::placeholder { color: var(--text-muted); }

    .send-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Welcome */
    .welcome {
      max-width: 800px;
      width: 100%;
      margin: auto;
      text-align: center;
      padding: 48px 24px;
    }

    .welcome h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 24px;
    }

    .welcome-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-dim);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">S</div>
    <div class="header-title">StudioMind</div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>StudioMind</h2>
      <p>AI mixing engineer for FL Studio. Ask me anything about your project.</p>
      <div class="welcome-suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">Read the project and tell me what you see</div>
        <div class="suggestion" onclick="sendSuggestion(this)">EQ all tracks for a clean mix</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Find frequency masking issues</div>
        <div class="suggestion" onclick="sendSuggestion(this)">What plugins are loaded?</div>
      </div>
    </div>

    <div class="thinking" id="thinking">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span>Thinking...</span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <textarea
        class="input-box"
        id="inputBox"
        placeholder="Tell StudioMind what to do..."
        rows="1"
        autofocus
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const thinking = document.getElementById('thinking');
    const welcome = document.getElementById('welcome');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let ws;
    let isProcessing = false;
    let currentToolEl = null;

    function connectWS() {
      ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        sendBtn.disabled = false;
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === 'system') {
          statusDot.classList.add('connected');
          statusText.textContent = data.content;
          addMessage('system', data.content);
        }
        else if (data.type === 'assistant') {
          thinking.classList.remove('active');
          addMessage('assistant', data.content);
        }
        else if (data.type === 'tool_call') {
          currentToolEl = addToolCall(data.tool, data.input);
        }
        else if (data.type === 'tool_result') {
          if (currentToolEl) {
            addToolResult(currentToolEl, data.result);
            currentToolEl = null;
          }
        }
        else if (data.type === 'error') {
          thinking.classList.remove('active');
          addMessage('error', data.content);
        }
        else if (data.type === 'done') {
          thinking.classList.remove('active');
          isProcessing = false;
          sendBtn.disabled = false;
          inputBox.focus();
        }

        scrollToBottom();
      };

      ws.onclose = () => {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Disconnected';
        sendBtn.disabled = true;
        setTimeout(connectWS, 3000);
      };

      ws.onerror = () => {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Connection error';
      };
    }

    function send() {
      const text = inputBox.value.trim();
      if (!text || isProcessing || !ws || ws.readyState !== WebSocket.OPEN) return;

      welcome.style.display = 'none';
      addMessage('user', text);
      ws.send(JSON.stringify({ type: 'message', content: text }));

      inputBox.value = '';
      inputBox.style.height = 'auto';
      isProcessing = true;
      sendBtn.disabled = true;
      thinking.classList.add('active');
      scrollToBottom();
    }

    function sendSuggestion(el) {
      inputBox.value = el.textContent;
      send();
    }

    function addMessage(type, content) {
      const div = document.createElement('div');
      div.className = `message msg-${type}`;

      if (type === 'assistant') {
        div.innerHTML = formatMarkdown(content);
      } else {
        div.textContent = content;
      }

      messages.insertBefore(div, thinking);
      return div;
    }

    function addToolCall(tool, input) {
      const div = document.createElement('div');
      div.className = 'message msg-tool';
      div.innerHTML = `
        <div class="tool-header">
          <span class="tool-icon">&#9881;</span>
          <span>${escapeHtml(tool)}</span>
        </div>
        <div class="tool-detail">${escapeHtml(input)}</div>
      `;
      messages.insertBefore(div, thinking);
      return div;
    }

    function addToolResult(toolEl, result) {
      const resultDiv = document.createElement('div');
      resultDiv.className = 'tool-result';
      resultDiv.textContent = result;
      toolEl.appendChild(resultDiv);
    }

    function formatMarkdown(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code style="background:#262626;padding:2px 6px;border-radius:4px;font-size:13px">$1</code>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messages.scrollTop = messages.scrollHeight;
      });
    }

    // Auto-resize textarea
    inputBox.addEventListener('input', () => {
      inputBox.style.height = 'auto';
      inputBox.style.height = Math.min(inputBox.scrollHeight, 200) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    inputBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    connectWS();
  </script>
</body>
</html>
